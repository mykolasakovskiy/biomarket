{% extends "base.html" %}
{% block content %}
<div class="row g-4">
  <div class="col-md-6">
    {% with img=product.images.first %}
      {% if img %}<img src="{{ img.image_url }}" class="img-fluid rounded border" alt="{{ product.title }}">{% endif %}
    {% endwith %}
  </div>
  <div class="col-md-6">
    <h1 class="h3">{{ product.title }}</h1>
    <p class="text-muted">{{ product.category.name }}</p>
    <p>{{ product.description|linebreaks }}</p>
    <div class="d-flex align-items-center gap-3">
      <strong class="fs-5">{{ product.price }} {{ currency }}</strong>
      <a class="btn btn-success" href="{% url 'shop:cart_add' product.id %}">Додати до кошика</a>
    </div>
  </div>
</div>
{% endblock %}
