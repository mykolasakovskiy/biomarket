<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biomarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar .nav-link.active{font-weight:600}
    .product-card img{object-fit:cover;height:180px;width:100%}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-light mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'shop:home' %}">Biomarket</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="topnav" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'shop:home' %}">Каталог</a></li>
        {% if categories_menu %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Категорії</a>
            <ul class="dropdown-menu">
              {% for c in categories_menu %}
                <li><a class="dropdown-item" href="{{ c.get_absolute_url }}">{{ c.name }}</a></li>
              {% endfor %}
            </ul>
          </li>
        {% endif %}
        <li class="nav-item"><a class="nav-link" href="{% url 'shop:cart' %}">Кошик ({{ cart_total_items }})</a></li>
      </ul>
      <form class="d-flex" role="search" action="{% url 'shop:home' %}">
        <input class="form-control me-2" type="search" placeholder="Пошук товарів..." name="q" value="{{ request.GET.q }}">
        <button class="btn btn-outline-primary" type="submit">Пошук</button>
      </form>
    </div>
  </div>
</nav>

<main class="container pb-5">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
